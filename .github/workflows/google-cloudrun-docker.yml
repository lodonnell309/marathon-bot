# This workflow build and push a Docker container to Google Artifact Registry
# and deploy it on Cloud Run when a commit is pushed to the "main"
# branch.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - Cloud Run (run.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
# 2. Add your service account key to GitHub secrets:
#    - In the Google Cloud Console, navigate to IAM & Admin > Service Accounts.
#    - Select your 'marathon-bot-deployer' service account.
#    - Go to the 'Keys' tab and click 'ADD KEY' -> 'Create new key'.
#    - Choose JSON and create. A file will be downloaded.
#    - Copy the contents of this JSON file.
#    - In your GitHub repository, go to Settings > Secrets and variables > Actions.
#    - Create a new secret named `GCP_SA_KEY` and paste the JSON content.
#
# 3. Ensure the service account has the following roles:
#    - Artifact Registry Writer (roles/artifactregistry.writer)
#    - Cloud Run Admin (roles/run.admin)
#    - Secret Manager Secret Accessor (roles/secretmanager.secretAccessor)
#
# 4. Change the values in the "env" block to match your values.

name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: 'marathon-training-agent'
  REGION: 'us-central1'
  SERVICE: 'marathon-bot'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      # Authenticate to Google Cloud using a service account key from GitHub Secrets
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # --- START: Build, Push, and Deploy ---
      - name: 'Build and Push Container'
        run: |
          # The DOCKER_TAG variable is used to tag the Docker image.
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}"
          
          # Build the Docker image with the tag.
          docker build --tag "${DOCKER_TAG}" .

          # Authenticate to Artifact Registry and push the image.
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet
          docker push "${DOCKER_TAG}"

      - name: 'Deploy to Cloud Run'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}'
          secrets: >
            STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }},
            STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }},
            STRAVA_VERIFY_TOKEN=${{ secrets.STRAVA_VERIFY_TOKEN }},
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      # --- END: Build, Push, and Deploy ---

      # --- START: Post-Deployment Steps ---
      - name: 'Get Cloud Run Service URL'
        id: 'get-url'
        run: |
          # Use gcloud to get the deployed service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "CLOUD_RUN_SERVICE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
          echo "Service URL is: $SERVICE_URL"

      - name: 'Update Strava Webhook'
        env:
          # Assuming you have set up these secrets in your GitHub repository
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_VERIFY_TOKEN: ${{ secrets.STRAVA_VERIFY_TOKEN }}
        run: |
          # Construct the callback URL
          CALLBACK_URL="${{ env.CLOUD_RUN_SERVICE_URL }}/webhook"
          
          # Delete any existing subscription first to avoid "already exists" error
          echo "Attempting to delete any existing Strava webhook subscription..."
          SUBSCRIPTIONS_URL="https://www.strava.com/api/v3/push_subscriptions"
          
          # First, get the subscription ID. The `gcloud` auth token is used here
          # for a robust curl request.
          SUBSCRIPTION_INFO=$(curl -s -G "${SUBSCRIPTIONS_URL}" \
            -d client_id="${{ env.STRAVA_CLIENT_ID }}" \
            -d client_secret="${{ env.STRAVA_CLIENT_SECRET }}")

          SUBSCRIPTION_ID=$(echo "$SUBSCRIPTION_INFO" | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          
          if [ -n "$SUBSCRIPTION_ID" ]; then
            echo "Found existing subscription with ID: ${SUBSCRIPTION_ID}. Deleting..."
            curl -X DELETE "${SUBSCRIPTIONS_URL}/${SUBSCRIPTION_ID}?client_id=${{ env.STRAVA_CLIENT_ID }}&client_secret=${{ env.STRAVA_CLIENT_SECRET }}"
          fi

          # Now create the new subscription
          echo "Creating new Strava webhook subscription with callback URL: ${CALLBACK_URL}"
          curl -X POST "${SUBSCRIPTIONS_URL}" \
               -F client_id="${{ env.STRAVA_CLIENT_ID }}" \
               -F client_secret="${{ env.STRAVA_CLIENT_SECRET }}" \
               -F callback_url="${CALLBACK_URL}" \
               -F verify_token="${{ env.STRAVA_VERIFY_TOKEN }}"
      # --- END: Post-Deployment Steps ---
