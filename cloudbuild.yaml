steps:
  # 1. Run unit tests
  # This step uses a standard Python image to install dependencies and run pytest.
  # If any tests fail, the build will stop here, preventing a broken build from being deployed.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'export PYTHONPATH=. && export TESTING=true && pip install -r requirements.txt && pytest'

  # # 1.5 Debug environment variables
  # - name: 'alpine'
  #   id: 'debug-env'
  #   entrypoint: 'sh'
  #   args: ['-c', 'echo "IMAGE TAG: ${_GCR_HOSTNAME}/${PROJECT_ID}/${_REPO_NAME}:${COMMIT_SHA}" && printenv | grep -E "PROJECT_ID|_GCR_HOSTNAME|_REPO_NAME|COMMIT_SHA"']

  # 2. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_GCR_HOSTNAME}/${PROJECT_ID}/${_REPO_NAME}:${COMMIT_SHA}'
      - '.'

 # 3. Authenticate Docker with Artifact Registry.
  # We set DOCKER_CONFIG to a path in the shared /workspace volume so the
  # credentials are created in a location accessible to subsequent steps.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'auth-docker'
    entrypoint: 'gcloud'
    args: ['auth', 'configure-docker', '${_GCR_HOSTNAME}']
    waitFor: ['build-image']
    env:
      - 'DOCKER_CONFIG=/workspace/.docker'

  # 4. Push the container image to Artifact Registry.
  # This step uses the credentials configured in the previous step by
  # pointing to the same DOCKER_CONFIG path in the shared workspace.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '${_GCR_HOSTNAME}/${PROJECT_ID}/${_REPO_NAME}:${COMMIT_SHA}']
    waitFor: ['auth-docker']
    env:
      - 'DOCKER_CONFIG=/workspace/.docker'

  # 5. Deploy the container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-to-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_GCR_HOSTNAME}/${PROJECT_ID}/${_REPO_NAME}:${COMMIT_SHA}'
      - '--region=${_DEPLOY_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      # Cloud Run automatically sets the PORT environment variable.
      # Your application should listen on the port defined by that variable.
      # The '--port' flag is not needed here if your app correctly uses os.environ.get('PORT', 8080)
      - '--update-secrets=STRAVA_CLIENT_ID=STRAVA_CLIENT_ID:latest'
      - '--update-secrets=STRAVA_CLIENT_SECRET=STRAVA_CLIENT_SECRET:latest'
      - '--update-secrets=STRAVA_VERIFY_TOKEN=STRAVA_VERIFY_TOKEN:latest'
      - '--update-secrets=TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest'
      - '--update-secrets=DATABASE_URL=DATABASE_URL:latest'
    # This step needs the deployment to finish first
    waitFor: ['push-image']
    # The 'run deploy' command can be slow, so we give it more time
    timeout: 600s
    env:
      - 'CLOUDSDK_CORE_PROJECT=${PROJECT_ID}'

  # 5. Get the deployed service URL for webhook update (optional, but a best practice)
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   id: 'get-service-url'
  #   entrypoint: gcloud
  #   args:
  #     - 'run'
  #     - 'services'
  #     - 'describe'
  #     - '${_SERVICE_NAME}'
  #     - '--region=${_DEPLOY_REGION}'
  #     - '--format=value(status.url)'
  #   # This step needs the deployment to finish first
  #   waitFor: ['deploy-to-cloud-run']
  #   # This will create a substitution variable for the next step
  #   env:
  #     - 'CLOUD_RUN_SERVICE_URL=${_CLOUD_RUN_SERVICE_URL}'


  # 6. Update the Strava webhook (optional, you can do this manually as well)
  # This is a sample step to show how you would use the service URL to update the webhook
  # You would need to have a pre-existing webhook ID to delete, and then create a new one.
  # - name: 'gcr.io/cloud-builders/curl'
  #   id: 'update-strava-webhook'
  #   args:
  #     - '-X'
  #     - 'PUT'
  #     - 'https://www.strava.com/api/v3/push_subscriptions/[YOUR_SUBSCRIPTION_ID]'
  #     - '-d'
  #     - 'client_id=[YOUR_STRAVA_CLIENT_ID]'
  #     - '-d'
  #     - 'client_secret=[YOUR_STRAVA_CLIENT_SECRET]'
  #     - '-d'
  #     - 'callback_url=${_CLOUD_RUN_SERVICE_URL}/webhook'
  #     - '-d'
  #     - 'verify_token=[YOUR_STRAVA_VERIFY_TOKEN]'
  #   waitFor: ['get-service-url']
  #   secretEnv:
  #     - 'STRAVA_CLIENT_ID'
  #     - 'STRAVA_CLIENT_SECRET'
  #     - 'STRAVA_VERIFY_TOKEN' #

# Store the image in Artifact Registry
images:
  - '${_GCR_HOSTNAME}/${PROJECT_ID}/${_REPO_NAME}:${COMMIT_SHA}'

# Specify the logging mode to resolve the service account logging issue.
options:
  logging: CLOUD_LOGGING_ONLY

# Define substitution variables that will be used in the trigger
substitutions:
  _SERVICE_NAME: 'marathon-bot'
  _REPO_NAME: 'marathon-bot'
  _DEPLOY_REGION: 'us-central1'
  _GCR_HOSTNAME: 'us-central1-docker.pkg.dev'
